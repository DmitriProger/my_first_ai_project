<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ValoriumGPT</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent-dim: #4a44b3;
      --text: #e8eaf0;
      --text-muted: #7a7d8d;
      --user-bubble: #6c63ff;
      --ai-bubble: #1e2130;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 20px 16px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .sidebar-brand h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .sidebar-actions {
      padding: 12px;
    }

    #new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
      font-family: inherit;
    }

    #new-chat-btn:hover { background: var(--accent-dim); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
    }

    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-item {
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background 0.1s, color 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      user-select: none;
    }

    .chat-item:hover {
      background: rgba(108, 99, 255, 0.1);
      color: var(--text);
    }

    .chat-item.active {
      background: rgba(108, 99, 255, 0.15);
      color: var(--text);
    }

    .chat-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-item svg { flex-shrink: 0; opacity: 0.6; }
    .chat-item.active svg { opacity: 1; }

    .chat-list-empty {
      padding: 16px 12px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    header span {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state .icon { font-size: 48px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles */
    .message.ai .bubble p { margin-bottom: 8px; }
    .message.ai .bubble p:last-child { margin-bottom: 0; }
    .message.ai .bubble h1,
    .message.ai .bubble h2,
    .message.ai .bubble h3 { margin: 14px 0 6px; font-weight: 700; }
    .message.ai .bubble h1 { font-size: 18px; }
    .message.ai .bubble h2 { font-size: 16px; }
    .message.ai .bubble h3 { font-size: 14px; }
    .message.ai .bubble ul,
    .message.ai .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .message.ai .bubble li { margin-bottom: 4px; }
    .message.ai .bubble code {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 12px;
    }
    .message.ai .bubble pre {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.ai .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
    }
    .message.ai .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .message.ai .bubble strong { font-weight: 700; }
    .message.ai .bubble em { font-style: italic; }
    .message.ai .bubble a { color: var(--accent); text-decoration: underline; }
    .message.ai .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .message-label {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      animation: fadeUp 0.2s ease;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px 24px 24px;
    }

    .input-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 12px 12px 18px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    #prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      font-family: inherit;
    }

    #prompt-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn svg { fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo">✦</div>
    <h2>ValoriumGPT</h2>
  </div>
  <div class="sidebar-actions">
    <button id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Новый чат
    </button>
  </div>
  <div class="chat-list" id="chat-list"></div>
</aside>

<div class="main">
  <header>
    <h1 id="chat-title">ValoriumGPT</h1>
    <span id="history-badge">загрузка...</span>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="icon">✦</div>
      <p>Задай вопрос — отвечу мгновенно</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea
        id="prompt-input"
        rows="1"
        placeholder="Напиши сообщение..."
      ></textarea>
      <button id="send-btn" title="Отправить">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</p>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let currentChatId = null;

  const chatEl = document.getElementById('chat');
  const input = document.getElementById('prompt-input');
  const sendBtn = document.getElementById('send-btn');
  const historyBadge = document.getElementById('history-badge');
  const chatTitleEl = document.getElementById('chat-title');
  const chatListEl = document.getElementById('chat-list');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  document.getElementById('new-chat-btn').addEventListener('click', createNewChat);

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function clearChatArea() {
    chatEl.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">✦</div>
        <p>Задай вопрос — отвечу мгновенно</p>
      </div>`;
  }

  function addMessage(role, text) {
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'Вы' : 'ValoriumGPT';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(indicator);
    chatEl.scrollTop = chatEl.scrollHeight;
    return indicator;
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    input.disabled = on;
  }

  // ── CHAT LIST ──

  async function loadChats() {
    try {
      const res = await fetch(`${API}/chats`);
      if (!res.ok) { historyBadge.textContent = 'бекенд недоступен'; return; }
      const chats = await res.json();
      renderChatList(chats);
      if (chats.length > 0) {
        await switchToChat(chats[0].id, chats[0].title);
      } else {
        historyBadge.textContent = '0 сообщений';
      }
    } catch {
      historyBadge.textContent = 'бекенд недоступен';
    }
  }

  function renderChatList(chats) {
    chatListEl.innerHTML = '';
    if (chats.length === 0) {
      chatListEl.innerHTML = '<div class="chat-list-empty">Нет чатов</div>';
      return;
    }
    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
      item.dataset.chatId = chat.id;
      item.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="chat-item-title">${escapeHtml(chat.title)}</span>`;
      item.addEventListener('click', () => switchToChat(chat.id, chat.title));
      chatListEl.appendChild(item);
    });
  }

  async function switchToChat(chatId, title) {
    currentChatId = chatId;
    chatTitleEl.textContent = title;

    document.querySelectorAll('.chat-item').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.chatId) === chatId);
    });

    clearChatArea();

    try {
      const res = await fetch(`${API}/chats/${chatId}/requests`);
      if (!res.ok) return;
      const messages = await res.json();
      if (messages.length > 0) {
        messages.forEach(m => {
          addMessage('user', m.prompt);
          addMessage('ai', m.response);
        });
      }
      historyBadge.textContent = `${messages.length} сообщений`;
    } catch {
      // silently fail
    }
  }

  async function createNewChat() {
    try {
      const res = await fetch(`${API}/chats`, { method: 'POST' });
      if (!res.ok) return;
      const chat = await res.json();

      const chatsRes = await fetch(`${API}/chats`);
      const chats = await chatsRes.json();
      renderChatList(chats);

      await switchToChat(chat.id, chat.title);
      input.focus();
    } catch (err) {
      console.error('Ошибка создания чата:', err);
    }
  }

  // ── MESSAGING ──

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // Auto-create a chat if none is active
    if (!currentChatId) {
      try {
        const res = await fetch(`${API}/chats`, { method: 'POST' });
        if (!res.ok) return;
        const chat = await res.json();
        currentChatId = chat.id;
        const chatsRes = await fetch(`${API}/chats`);
        renderChatList(await chatsRes.json());
        chatTitleEl.textContent = chat.title;
      } catch { return; }
    }

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    setLoading(true);

    const typing = showTyping();

    try {
      const res = await fetch(`${API}/requests`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, chat_id: currentChatId }),
      });

      if (!res.ok) throw new Error(`Ошибка ${res.status}`);

      const data = await res.json();
      typing.remove();
      addMessage('ai', data.answer);

      // Update chat title in sidebar if it was set from first message
      if (data.chat_title) {
        chatTitleEl.textContent = data.chat_title;
        const item = chatListEl.querySelector(`[data-chat-id="${currentChatId}"]`);
        if (item) {
          const titleEl = item.querySelector('.chat-item-title');
          if (titleEl) titleEl.textContent = data.chat_title;
        }
      }

      historyBadge.textContent = `${chatEl.querySelectorAll('.message.user').length} сообщений`;
    } catch (err) {
      typing.remove();
      addMessage('ai', `Не удалось получить ответ: ${err.message}`);
    } finally {
      setLoading(false);
      input.focus();
    }
  }

  loadChats();
</script>
</body>
</html>
