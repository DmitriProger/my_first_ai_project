<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ValoriumGPT</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent-dim: #4a44b3;
      --text: #e8eaf0;
      --text-muted: #7a7d8d;
      --user-bubble: #6c63ff;
      --ai-bubble: #1e2130;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state .icon { font-size: 48px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles */
    .message.ai .bubble p { margin-bottom: 8px; }
    .message.ai .bubble p:last-child { margin-bottom: 0; }
    .message.ai .bubble h1,
    .message.ai .bubble h2,
    .message.ai .bubble h3 { margin: 14px 0 6px; font-weight: 700; }
    .message.ai .bubble h1 { font-size: 18px; }
    .message.ai .bubble h2 { font-size: 16px; }
    .message.ai .bubble h3 { font-size: 14px; }
    .message.ai .bubble ul,
    .message.ai .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .message.ai .bubble li { margin-bottom: 4px; }
    .message.ai .bubble code {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 12px;
    }
    .message.ai .bubble pre {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message.ai .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
    }
    .message.ai .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .message.ai .bubble strong { font-weight: 700; }
    .message.ai .bubble em { font-style: italic; }
    .message.ai .bubble a { color: var(--accent); text-decoration: underline; }
    .message.ai .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .message-label {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      animation: fadeUp 0.2s ease;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px 24px 24px;
    }

    .input-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 12px 12px 18px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    #prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      font-family: inherit;
    }

    #prompt-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #send-btn svg { fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <h1>ValoriumGPT</h1>
  <span id="history-badge">загрузка...</span>
</header>

<div id="chat">
  <div class="empty-state" id="empty-state">
    <div class="icon">✦</div>
    <p>Задай вопрос — отвечу мгновенно</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea
      id="prompt-input"
      rows="1"
      placeholder="Напиши сообщение..."
    ></textarea>
    <button id="send-btn" title="Отправить">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</p>
</div>

<script>
  const API = 'http://localhost:8000';

  const chat = document.getElementById('chat');
  const input = document.getElementById('prompt-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');
  const historyBadge = document.getElementById('history-badge');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text) {
    emptyState.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'Вы' : 'ValoriumGPT';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(indicator);
    chat.scrollTop = chat.scrollHeight;
    return indicator;
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    input.disabled = on;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    setLoading(true);

    const typing = showTyping();

    try {
      const res = await fetch(`${API}/requests`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text }),
      });

      if (!res.ok) throw new Error(`Ошибка ${res.status}`);

      const data = await res.json();
      typing.remove();
      addMessage('ai', data.answer);
      updateHistoryBadge();
    } catch (err) {
      typing.remove();
      addMessage('ai', `Не удалось получить ответ: ${err.message}`);
    } finally {
      setLoading(false);
      input.focus();
    }
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${API}/requests`);
      if (!res.ok) return;
      const history = await res.json();

      if (history.length > 0) {
        emptyState.remove();
        history.forEach(item => {
          addMessage('user', item.prompt);
          addMessage('ai', item.response);
        });
      }

      updateHistoryBadge(history.length);
    } catch {
      historyBadge.textContent = 'бекенд недоступен';
    }
  }

  function updateHistoryBadge(count) {
    if (count === undefined) {
      fetch(`${API}/requests`)
        .then(r => r.json())
        .then(h => { historyBadge.textContent = `${h.length} запросов`; })
        .catch(() => {});
    } else {
      historyBadge.textContent = `${count} запросов`;
    }
  }

  loadHistory();
</script>
</body>
</html>
